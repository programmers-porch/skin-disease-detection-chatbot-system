<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skin Disease Chatbot</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f3f5f7;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 900px;
            margin: 40px auto;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
            padding: 24px;
        }
        h1 {
            margin-top: 0;
        }
        #chat {
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            padding: 16px;
            height: 480px;
            overflow-y: auto;
            background: #fafafa;
        }
        .msg {
            max-width: 85%;
            padding: 12px 14px;
            border-radius: 12px;
            margin: 10px 0;
            white-space: pre-wrap;
            line-height: 1.5;
        }
        .user {
            margin-left: auto;
            background: #dbeafe;
        }
        .bot {
            margin-right: auto;
            background: #ffffff;
            border: 1px solid #e5e7eb;
        }
        .input-row {
            display: flex;
            gap: 10px;
            margin-top: 14px;
        }
        input {
            flex: 1;
            padding: 14px;
            border-radius: 10px;
            border: 1px solid #d1d5db;
            font-size: 16px;
        }
        button {
            padding: 14px 18px;
            border: none;
            border-radius: 10px;
            background: #111827;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover {
            opacity: 0.92;
        }
        .note {
            margin-top: 10px;
            font-size: 13px;
            color: #6b7280;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>💬 Skin Disease Chatbot</h1>
        <p>Describe symptoms in text, and the chatbot will suggest the most likely skin condition.</p>

        <div id="chat"></div>

        <div class="input-row">
            <input id="input" type="text" placeholder="Example: itchy red patches on hands with dry skin">
            <button onclick="sendMessage()">Send</button>
        </div>

        <div class="note">
            Educational only. If symptoms are severe, rapidly spreading, or involve the eyes/mouth, seek medical care.
        </div>
    </div>

    <script>
        const chat = document.getElementById("chat");

        function addMessage(text, sender) {
            const div = document.createElement("div");
            div.className = "msg " + sender;
            div.textContent = text;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        addMessage("Hello. Describe the skin symptoms in text, and I will suggest the most likely condition.", "bot");

        async function sendMessage() {
            const input = document.getElementById("input");
            const message = input.value.trim();
            if (!message) return;

            addMessage(message, "user");
            input.value = "";

            const response = await fetch("/chat", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ message })
            });

            const data = await response.json();
            addMessage(data.reply, "bot");
        }

        input.addEventListener("keydown", function(event) {
            if (event.key === "Enter") {
                sendMessage();
            }
        });
    </script>
</body>
</html>
